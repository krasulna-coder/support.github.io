<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roistat Support</title>

  <link rel="icon" href="sticker.webp" />

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#111827;
      --border:#e6eaf2;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --radius:16px;
      --container: 1000px;
      --secondaryText: rgb(0, 105, 229);
      --font: "PT Sans", sans-serif;
    }

    body{
      margin:0;
      font-family: var(--font);
      background: var(--bg);
      padding: 48px 18px;
    }

    .container{
      max-width: var(--container);
      margin: 0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .layout{
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      align-items: center;
    }

    .btn-grid{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .btn-grid > button:nth-child(4),
    .btn-grid > button:nth-child(5){
      grid-column: 1 / -1;
    }

    button{
      padding: 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: .2s;
    }

    .btn-primary{
      background: #2589ff;
      color:#fff;
    }
    .btn-primary:hover{ background:#0069E5; }

    .btn-secondary{
      background:#fff;
      border:1px solid #D1D4D6;
      color: var(--secondaryText);
    }

    .btn-revert{
      border:1px solid #F35050;
      color:#F35050;
      background:#fff;
    }

    .right img{
      width:100%;
    }

    /* МОДАЛКА */
    .modal{
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.3);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow: var(--shadow);
      min-width:260px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .modal.show{
      display:flex;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="layout">

      <div class="left">
        <div class="btn-grid">

          <!-- НОВЫЙ ПОРЯДОК -->
          <button class="btn-primary" data-action="docs">Документация</button>
          <button class="btn-primary" data-action="product">Запрос в продукт</button>
          <button class="btn-primary" data-action="api">Тест API</button>

          <button class="btn-revert" data-action="bug">Баг-репорт</button>

          <button class="btn-secondary" data-action="task">Таск в разработку</button>

        </div>
      </div>

      <div class="right">
        <img src="sticker.webp">
      </div>

    </div>
  </div>
</div>

<!-- МОДАЛКИ -->

<div id="docsModal" class="modal">
  <div class="modal-content">
    <button class="btn-primary">Внешняя</button>
    <button class="btn-primary">Внутренняя</button>
    <button class="btn-primary">API</button>
    <button class="btn-primary">JS SDK</button>
  </div>
</div>

<div id="bugModal" class="modal">
  <div class="modal-content">
    <button class="btn-primary">Баг в Roistat</button>
    <button class="btn-primary">Баг в ERP</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
