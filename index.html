<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roistat QA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 class="logo">Roistat QA</h1>
        </header>

        <main class="grid">

            <button class="card" data-action="api">
                <span>Тестирование API</span>
            </button>

            <button class="card" data-action="docs">
                <span>Документация</span>
            </button>

            <button class="card" data-action="product">
                <span>Запрос в продукт</span>
            </button>

            <button class="card" data-action="bug">
                <span>Баг-репорт</span>
            </button>

            <button class="card" data-action="task">
                <span>Таск в разработку</span>
            </button>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
