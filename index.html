<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roistat QA</title>

    <link rel="icon" href="sticker.webp">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- Левая часть -->
        <div class="left">

            <div class="buttons-row">
                <button class="btn primary" data-action="api">
                    Тестирование API (Hoppscotch)
                </button>

                <button class="btn primary" data-action="docs">
                    Документация
                </button>

                <button class="btn primary" data-action="product">
                    Запрос в продукт
                </button>
            </div>

            <button class="btn danger" data-action="bug">
                Баг-репорт
            </button>

            <button class="btn secondary" data-action="task">
                Таск в разработку
            </button>

        </div>

        <!-- Правая часть -->
        <div class="right">
            <img src="sticker.webp" alt="meme">
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
