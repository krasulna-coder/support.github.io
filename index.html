<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roistat QA</title>

  <link rel="icon" href="sticker.webp" />

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e6eaf2;

      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --radius:16px;

      --container: 1000px;

      --headingColor: rgb(71, 71, 102);
      --secondaryText: rgb(0, 105, 229);
      --font: "PT Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans";
    }

    *{ box-sizing:border-box; }
    html, body { height:auto; min-height:100%; }

    body{
      margin:0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      background:
        radial-gradient(1100px 500px at 50% -50px, rgba(47,128,237,.10), transparent 60%),
        radial-gradient(900px 420px at 10% 0%, rgba(109,94,252,.08), transparent 55%),
        var(--bg);
      padding: 48px 18px 48px;
    }

    .container{
      width:100%;
      max-width: var(--container);
      margin: 0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 20px 18px;
    }

    .layout{
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      align-items: center;
    }

    .left{
      min-width: 0;
      align-self: center;
    }

    .btn-grid{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
    }

    .btn-grid > button:nth-child(4),
    .btn-grid > button:nth-child(5){
      grid-column: 1 / -1;
    }

    button{
      width: 100%;
      border: 0;
      border-radius: 4px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: .15s;
    }

    button:active{ transform: translateY(1px); }

    .btn-primary{
      color:#fff;
      background: #2589ff;
    }
    .btn-primary:hover{ background: #0069E5; }

    .btn-secondary{
      color: var(--secondaryText);
      background:#ffffff;
      border: 1px solid #D1D4D6;
    }
    .btn-secondary:hover{ background:#EFF6FF; }

    .btn-revert{
      color:#F35050;
      background:#ffffff;
      border: 1px solid #F35050;
    }
    .btn-revert:hover{ background:#FCCBCBB2; }

    .right{
      display:flex;
      justify-content: flex-end;
      align-items: center;
    }

    .imageWrap{
      max-height: min(420px, 55vh);
    }

    .imageWrap img{
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    @media (max-width: 920px){
      .layout{
        grid-template-columns: 1fr;
      }

      .btn-grid{
        grid-template-columns: 1fr;
      }

      .right{
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="layout">

        <div class="left">
          <div class="btn-grid">

            <button class="btn-primary" data-action="api">
              Тестирование API (Hoppscotch)
            </button>

            <button class="btn-primary" data-action="docs">
              Документация
            </button>

            <button class="btn-primary" data-action="product">
              Запрос в продукт
            </button>

            <button class="btn-revert" data-action="bug">
              Баг-репорт
            </button>

            <button class="btn-secondary" data-action="task">
              Таск в разработку
            </button>

          </div>
        </div>

        <div class="right">
          <div class="imageWrap">
            <img src="sticker.webp" alt="мем">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
